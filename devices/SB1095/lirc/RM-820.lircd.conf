#
#
# Creative RM-820
# 
# Remote comes with X-FI SURROUND 5.1 PRO (SB1095) USB sound card
#
# Put this file to /etc/lirc/lircd.conf.d/

begin remote
    name    RM-820
    bits    8
    gap 300000

    begin codes
		KNOB_VOLUMEUP 0x10 
		KNOB_VOLUMEDOWN 0x0f
		KNOB_MUTE 0x0d

		KEY_VOLUMEUP 0x2b
		KEY_VOLUMEDOWN 0x2c
    	KEY_MUTE 0x2a
		KEY_MENU 0x2d
		KEY_BACK 0x1b  # long press MENU key
		KEY_POWER 0x29
		
		KEY_UP 0x31
		KEY_DOWN 0x32
		KEY_LEFT 0x27
		KEY_RIGHT 0x28
		KEY_OK 0x30
		KEY_MEDIA_REPEAT 0x3c
		KEY_SHUFFLE 0x3b
		KEY_RETURN 0x1a

		KEY_PREVIOUS 0x33
		KEY_REWIND 0x35 # long press PREVIOUS key
		KEY_PLAYPAUSE 0x2f
		KEY_NEXT 0x34
		KEY_FORWARD 0x36 # long press NEXT key
    end codes

end remote
